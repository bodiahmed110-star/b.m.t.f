<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة الأبطال - الثيم البنفسجي والأزرق</title>
    <style>
        /* إعدادات الخلفية السوداء */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000000;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* تأثير الشرائط البنفسجية المتساقطة في الخلفية */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(191, 0, 255, 0) 0%, rgba(191, 0, 255, 0.04) 50%, rgba(191, 0, 255, 0) 100%),
                        linear-gradient(90deg, rgba(191, 0, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 40px 100%;
            pointer-events: none;
            z-index: 0;
            animation: rain 20s linear infinite;
        }

        /* حاوية تأثير الخطوط الطولية النيون */
        .bg-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.12;
            display: flex;
            justify-content: space-around;
        }

        .line {
            width: 2px;
            height: 100%;
            background: linear-gradient(to bottom, transparent, #bf00ff, transparent);
            animation: drop 3s infinite linear;
        }

        /* توقيت مختلف للخطوط لجعل الحركة عشوائية وبسيطة */
        .line:nth-child(1) { animation-delay: 0s; animation-duration: 4s; }
        .line:nth-child(2) { animation-delay: 1.5s; animation-duration: 3s; }
        .line:nth-child(3) { animation-delay: 0.5s; animation-duration: 5s; }
        .line:nth-child(4) { animation-delay: 2s; animation-duration: 3.5s; }
        .line:nth-child(5) { animation-delay: 1s; animation-duration: 4.5s; }

        .container {
            width: 100%;
            max-width: 650px;
            margin-top: 50px; /* مساحة علوية كافية للتاج */
            position: relative;
            z-index: 1;
        }

        /* تصميم المربع العريض باللون البنفسجي اللامع */
        .player-card {
            background: #09010e; /* أسود ملكي مائل للبنفسجي الداكن جداً */
            border: 2px solid #bf00ff; /* بنفسجي نيون لامع */
            border-radius: 10px;
            padding: 16px 22px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 0 12px rgba(191, 0, 255, 0.25), inset 0 0 8px rgba(191, 0, 255, 0.1);
            position: relative;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1);
            user-select: none;
        }

        /* لافتة الاسم باللون البنفسجي المضيء */
        .player-name {
            font-size: 1.15rem;
            font-weight: 600;
            color: #df80ff; /* بنفسجي فاتح مشع */
            text-shadow: 0 0 8px rgba(191, 0, 255, 0.4);
            transition: all 0.35s ease;
        }

        /* شارة عدد البطولات في جهة اليسار */
        .player-titles {
            font-size: 0.95rem;
            color: #ffffff;
            background: #bf00ff;
            padding: 5px 14px;
            border-radius: 20px;
            font-weight: bold;
            box-shadow: 0 0 8px #bf00ff;
            transition: all 0.35s ease;
            white-space: nowrap;
        }

        /* تمييز المربع الأول صاحب التاج وزيادة مساحته العلوية */
        .first-place {
            margin-top: 10px;
        }

        /* التاج فوق الاسم الأول */
        .crown-tag {
            position: absolute;
            top: -38px;
            right: 22px;
            font-size: 1.9rem;
            filter: drop-shadow(0 0 5px #bf00ff);
            animation: bounce 2s infinite;
        }

        /* تمييز المربع الأخير (حامل آخر لقب) */
        .last-champion {
            border-style: dashed; /* إطار متقطع مميز */
        }

        /* شارة حامل آخر لقب */
        .champion-badge {
            font-size: 0.85rem;
            color: #ffffff;
            background: #bf00ff;
            padding: 3px 8px;
            border-radius: 4px;
            margin-right: 10px;
            font-weight: bold;
            display: inline-block;
            box-shadow: 0 0 5px #bf00ff;
            transition: all 0.35s ease;
        }

        .star-icon {
            color: #df80ff;
            margin-right: 5px;
            font-size: 1.15rem;
            transition: all 0.35s ease;
        }

        /* ================================================== */
        /* تأثير الإشعاع باللون الأزرق النيون عند الضغط أو اللمس */
        /* ================================================== */
        .player-card:hover, .player-card:active {
            border-color: #00d2ff; /* يتحول الإطار للأزرق السماوي المضيء */
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.85), inset 0 0 10px rgba(0, 210, 255, 0.3);
            background: #010a12; /* خلفية زرقاء داكنة جداً للمربع */
            transform: scale(1.025); /* تكبير مرن للتفاعل */
        }

        .player-card:hover .player-name, .player-card:active .player-name {
            color: #80e5ff; /* الاسم يشع بالأزرق الفاتح النيون */
            text-shadow: 0 0 12px rgba(0, 210, 255, 0.8);
        }

        .player-card:hover .player-titles, .player-card:active .player-titles {
            background: #00d2ff; /* شارة البطولات تتحول للأزرق */
            color: #000000; /* الكتابة تصبح سوداء بداخلها لتبق واضحة */
            box-shadow: 0 0 12px #00d2ff;
        }

        .player-card:hover .champion-badge, .player-card:active .champion-badge {
            background: #00d2ff; /* شارة بطل آخر نسخة تتحول للأزرق */
            color: #000000;
            box-shadow: 0 0 8px #00d2ff;
        }

        .player-card:hover .star-icon, .player-card:active .star-icon {
            color: #80e5ff; /* النجمة تشع بالأزرق الفاتح أيضاً */
        }
        /* ================================================== */

        /* الأنميشن وحركات الخلفية والتاج */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        @keyframes drop {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        @keyframes rain {
            0% { background-position: 0 0; }
            100% { background-position: 0 1000px; }
        }
    </style>
</head>
<body>

<div class="bg-lines">
    <div class="line"></div>
    <div class="line"></div>
    <div class="line"></div>
    <div class="line"></div>
    <div class="line"></div>
</div>

<div class="container">

    <div class="player-card first-place">
        <div class="crown-tag">👑</div>
        <div class="player-name">محمد الوفاقى</div>
        <div class="player-titles">٣ بطولات</div>
    </div>

    <div class="player-card">
        <div class="player-name">محمد شهاب</div>
        <div class="player-titles">بطولة واحدة</div>
    </div>

    <div class="player-card">
        <div class="player-name">ياسين بغدادى</div>
        <div class="player-titles">بطولة واحدة</div>
    </div>

    <div class="player-card">
        <div class="player-name">مصطفى ابراهيم</div>
        <div class="player-titles">بطولة واحدة</div>
    </div>

    <div class="player-card last-champion">
        <div class="player-name">
            احمد هشام
            <span class="champion-badge">حامل اخر لقب</span>
            <span class="star-icon">⭐</span>
        </div>
        <div class="player-titles">بطولة واحدة</div>
    </div>

</div>

</body>
</html>
