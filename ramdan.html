<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة الأبطال - الثيم الذهبي والزيتي</title>
    <style>
        /* إعدادات الخلفية السوداء */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000000;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* تأثير الشرائط الذهبية المتساقطة في الخلفية */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(184, 134, 11, 0) 0%, rgba(184, 134, 11, 0.05) 50%, rgba(184, 134, 11, 0) 100%),
                        linear-gradient(90deg, rgba(184, 134, 11, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 40px 100%;
            pointer-events: none;
            z-index: 0;
            animation: rain 20s linear infinite;
        }

        /* حاوية تأثير الخطوط الطولية */
        .bg-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.12;
            display: flex;
            justify-content: space-around;
        }

        .line {
            width: 2px;
            height: 100%;
            background: linear-gradient(to bottom, transparent, #b8860b, transparent);
            animation: drop 3.5s infinite linear;
        }

        .line:nth-child(1) { animation-delay: 0s; animation-duration: 4s; }
        .line:nth-child(2) { animation-delay: 1.2s; animation-duration: 3s; }
        .line:nth-child(3) { animation-delay: 0.6s; animation-duration: 4.8s; }
        .line:nth-child(4) { animation-delay: 2.2s; animation-duration: 3.2s; }
        .line:nth-child(5) { animation-delay: 1.5s; animation-duration: 4.2s; }

        .container {
            width: 100%;
            max-width: 650px;
            margin-top: 50px; /* مساحة علوية كافية للتاج الأول */
            position: relative;
            z-index: 1;
        }

        /* تصميم المربع العريض باللون الذهبي الغامق */
        .player-card {
            background: #0d0b05;
            border: 2px solid #996515;
            border-radius: 8px;
            padding: 16px 20px;
            margin-bottom: 40px; /* مسافة واضحة لمنع تداخل التيجان مع المربعات */
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 0 12px rgba(153, 101, 21, 0.25);
            position: relative;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1);
            user-select: none;
        }

        /* الاسم باللون الذهبي */
        .player-name {
            font-size: 1.15rem;
            font-weight: 600;
            color: #d4af37;
            text-shadow: 0 0 5px rgba(212, 175, 55, 0.3);
            transition: all 0.35s ease;
        }

        /* شارة عدد البطولات في أقصى اليسار */
        .player-titles {
            font-size: 0.95rem;
            color: #000000;
            background: #996515;
            padding: 5px 14px;
            border-radius: 20px;
            font-weight: bold;
            box-shadow: 0 0 5px rgba(153, 101, 21, 0.5);
            transition: all 0.35s ease;
        }

        /* وسم التاج فوق كل المربعات */
        .crown-tag {
            position: absolute;
            top: -35px;
            right: 20px;
            font-size: 1.8rem;
            animation: bounce 2s infinite;
        }

        /* تخصيص المربع الأخير */
        .last-champion {
            border-style: dashed;
        }

        /* شارة بطل آخر نسخة */
        .champion-badge {
            font-size: 0.85rem;
            color: #000000;
            background: #996515;
            padding: 3px 8px;
            border-radius: 4px;
            margin-right: 10px;
            font-weight: bold;
            display: inline-block;
            box-shadow: 0 0 5px rgba(153, 101, 21, 0.5);
            transition: all 0.35s ease;
        }

        .star-icon {
            color: #d4af37;
            margin-right: 5px;
            font-size: 1.15rem;
            transition: all 0.35s ease;
        }

        /* الجملة المنفصلة في الأسفل تماماً */
        .ramadan-footer {
            margin-top: 20px;
            margin-bottom: 30px;
            font-size: 1.8rem;
            font-weight: bold;
            color: #d4af37;
            text-align: center;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
            position: relative;
            z-index: 1;
            letter-spacing: 1px;
        }

        /* ================================================== */
        /* تأثير الإشعاع باللون الزيتي عند الضغط أو اللمس أو التمرير */
        /* ================================================== */
        .player-card:hover, .player-card:active {
            border-color: #556b2f;
            box-shadow: 0 0 25px rgba(85, 107, 47, 0.8);
            background: #070a04;
            transform: scale(1.025);
        }

        .player-card:hover .player-name, .player-card:active .player-name {
            color: #9acd32;
            text-shadow: 0 0 12px rgba(154, 205, 50, 0.7);
        }

        .player-card:hover .player-titles, .player-card:active .player-titles {
            background: #556b2f;
            color: #ffffff;
            box-shadow: 0 0 12px #556b2f;
        }

        .player-card:hover .champion-badge, .player-card:active .champion-badge {
            background: #556b2f;
            color: #ffffff;
            box-shadow: 0 0 10px #556b2f;
        }

        .player-card:hover .star-icon, .player-card:active .star-icon {
            color: #9acd32;
            text-shadow: 0 0 8px #9acd32;
        }
        /* ================================================== */

        /* الأنميشن وحركات الخلفية والتاج */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        @keyframes drop {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        @keyframes rain {
            0% { background-position: 0 0; }
            100% { background-position: 0 1000px; }
        }
    </style>
</head>
<body>

<div class="bg-lines">
    <div class="line"></div>
    <div class="line"></div>
    <div class="line"></div>
    <div class="line"></div>
    <div class="line"></div>
</div>

<div class="container">

    <div class="player-card">
        <div class="crown-tag">👑</div>
        <div class="player-name">على هانى</div>
        <div class="player-titles">بطولة واحدة</div>
    </div>

    <div class="player-card">
        <div class="crown-tag">👑</div>
        <div class="player-name">صهيب احمد</div>
        <div class="player-titles">بطولة واحدة</div>
    </div>

    <div class="player-card last-champion">
        <div class="crown-tag">👑</div>
        <div class="player-name">
            مهند محمد
            <span class="champion-badge">بطل آخر نسخة</span>
            <span class="star-icon">⭐</span>
        </div>
        <div class="player-titles">بطولة واحدة</div>
    </div>

</div>

<div class="ramadan-footer">🌙 رمضان كريم 🌙</div>

</body>
</html>
